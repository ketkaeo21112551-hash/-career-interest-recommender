<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Interest Recommender</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        h1 {
            font-size: 24px;
            color: var(--primary);
            text-align: center;
            margin-bottom: 8px;
        }
        p.subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .question-box {
            margin-bottom: 20px;
        }
        .question-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-btn {
            background: #ffffff;
            border: 2px solid var(--border-color);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option-btn:hover {
            border-color: var(--primary);
            background: #f1f5f9;
        }
        .option-btn.selected {
            border-color: var(--primary);
            background: #eef2ff;
            color: var(--primary);
            font-weight: 600;
        }
        .action-btn {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .action-btn:hover {
            background: var(--primary-hover);
        }
        .result-container {
            text-align: center;
            display: none;
        }
        .result-container h2 {
            color: var(--primary);
            margin-bottom: 12px;
        }
        .result-card {
            background: #eef2ff;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #312e81;
        }
        .restart-btn {
            background: #64748b;
            margin-top: 15px;
        }
        .restart-btn:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="quiz-screen">
            <h1>Career Interest Recommender</h1>
            <p class="subtitle">ค้นหาเส้นทางอาชีพที่ใช่สำหรับคุณด้วยระบบวิเคราะห์เบื้องต้น</p>
            <div class="question-box">
                <div class="question-title">1. คุณชื่นชอบกิจกรรมแนวไหนมากที่สุด?</div>
                <div class="options" data-question="q1">
                    <button class="option-btn" onclick="selectOption(this, 'q1', 'tech')">💻 นั่งหน้าคอม เขียนโค้ด ออกแบบเว็บ หรือทำกราฟิก 3D</button>
                    <button class="option-btn" onclick="selectOption(this, 'q1', 'people')">🤝 พูดคุย เจรจา หรือทำงานร่วมกับผู้อื่น</button>
                    <button class="option-btn" onclick="selectOption(this, 'q1', 'art')">🎨 วาดรูป ออกแบบผลงานศิลปะ หรือสร้างสรรค์คอนเทนต์</button>
                    <button class="option-btn" onclick="selectOption(this, 'q1', 'math')">📊 วิเคราะห์ตัวเลข สถิติ หรือบริหารจัดการข้อมูล</button>
                </div>
            </div>
            <button class="action-btn" onclick="showResult()">ดูผลลัพธ์อาชีพ</button>
        </div>
        <div id="result-screen" class="result-container">
            <h2>ผลการวิเคราะห์อาชีพที่เหมาะสม</h2>
            <p>จากความสนใจของคุณ อาชีพที่น่าสนใจและเหมาะกับคุณคือ:</p>
            <div class="result-card" id="career-result">กำลังประมวลผล...</div>
            <button class="action-btn restart-btn" onclick="resetQuiz()">ทำแบบทดสอบอีกครั้ง</button>
        </div>
    </div>
    <script>
        let selectedAnswers = { q1: '' };
        function selectOption(button, question, value) {
            const parent = button.parentElement;
            parent.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            button.classList.add('selected');
            selectedAnswers[question] = value;
        }
        function showResult() {
            if (!selectedAnswers.q1) {
                alert('กรุณาเลือกคำตอบก่อนกดดูผลลัพธ์ครับ!');
                return;
            }
            let career = '';
            switch(selectedAnswers.q1) {
                case 'tech':
                    career = 'Software Developer / Frontend Engineer หรือ 3D Character Artist';
                    break;
                case 'people':
                    career = 'HR (ทรัพยากรบุคคล) / Project Manager หรือ นักการตลาด';
                    break;
                case 'art':
                    career = 'Graphic Designer / UI-UX Designer หรือ Animator';
                    break;
                case 'math':
                    career = 'Data Analyst / นักสถิติ หรือ นักวางแผนการเงิน';
                    break;
                default:
                    career = 'General Consultant / นักพัฒนาโปรเจกต์อเนกประสงค์';
            }
            document.getElementById('career-result').innerText = career;
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
        }
        function resetQuiz() {
            selectedAnswers.q1 = '';
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
        }
    </script>
</body>
</html>
