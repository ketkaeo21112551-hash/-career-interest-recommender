<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Interest Recommender</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f8fafc;
            color: #1e293b;
            text-align: center;
            padding: 50px 20px;
        }
        .card {
            background: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 { color: #4f46e5; }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Career Interest Recommender</h1>
        <p>ระบบค้นหาเส้นทางอาชีพที่ใช่สำหรับคุณ</p>
        <button onclick="alert('ยินดีด้วย! เว็บไซต์ใช้งานได้ปกติแล้วครับ 🎉')">กดเพื่อทดสอบระบบ</button>
    </div>
</body>
</html>
