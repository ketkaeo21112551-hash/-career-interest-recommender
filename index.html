<script>
async function askAI() {
    const userInput = document.getElementById("interest").value;
    const resultDiv = document.getElementById("result");
    if (!userInput) return alert("กรุณากรอกความสนใจ");
    
    resultDiv.innerText = "กำลังวิเคราะห์...";
    
    // เปลี่ยนมาใช้การสุ่มคำตอบแทนการเรียก API
    setTimeout(() => {
        const answers = [
            "จากความสนใจของคุณ อาชีพที่น่าจะเหมาะคือ กราฟิกดีไซน์เนอร์ ครับ",
            "คุณเหมาะกับงานสาย Programmer หรือ Data Analyst ครับ",
            "ลองศึกษาอาชีพ Content Creator ดูไหมครับ เหมาะกับความสนใจของคุณมาก",
            "อาชีพนักวางแผนกลยุทธ์น่าจะตอบโจทย์คุณครับ"
        ];
        const randomAnswer = answers[Math.floor(Math.random() * answers.length)];
        resultDiv.innerText = randomAnswer;
    }, 1500); // รอ 1.5 วินาทีเพื่อให้ดูเหมือนว่ากำลังคิด
}
</script>
