<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบทดสอบค้นหาอาชีพ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">
  <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
    <h1 class="text-2xl font-bold text-center mb-6">🎯 แบบทดสอบค้นหาตัวตน (10 ข้อ)</h1>
    
    <form id="quiz-form" class="space-y-6">
      <div id="questions-container" class="space-y-6">
        </div>
      
      <button type="button" onclick="calculateResult()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">ดูผลการวิเคราะห์</button>
    </form>

    <div id="result" class="hidden mt-8 p-6 bg-blue-50 border-2 border-blue-200 rounded-2xl text-center">
      <h3 id="job-name" class="text-2xl font-bold text-blue-900 mb-2"></h3>
      <p id="job-desc" class="text-gray-700"></p>
    </div>
  </div>

  <script>
    const questions = [
      "1. ยามว่างคุณชอบทำกิจกรรมอะไร?", "2. เมื่อเพื่อนมีปัญหา คุณทำอะไร?", "3. ชอบทำงานที่ไหน?", 
      "4. คนอื่นชมคุณว่าอะไร?", "5. ถ้าเลือกอ่านหนังสือ จะอ่านแนวไหน?", "6. เป้าหมายสูงสุดในชีวิตคือ?", 
      "7. คุณรับมือกับความกดดันยังไง?", "8. วิชาที่คุณชอบที่สุด?", "9. นิสัยเด่นของคุณ?", "10. คุณอยากเห็นตัวเองเป็นอะไรใน 10 ปีข้างหน้า?"
    ];

    const container = document.getElementById('questions-container');
    questions.forEach((q, i) => {
      container.innerHTML += `
        <div class="p-4 bg-slate-50 rounded-xl border">
          <label class="block font-semibold mb-2">${q}</label>
          <select name="q${i}" class="w-full p-2 border rounded-lg">
            <option value="teacher">คุณครู</option>
            <option value="artist">ศิลปิน/นักวาด</option>
            <option value="engineer">วิศวกร</option>
            <option value="doctor">คุณหมอ/พยาบาล</option>
            <option value="police">ตำรวจ/ทหาร</option>
          </select>
        </div>
      `;
    });

        scores[s.value] = (scores[s.value] || 0) + 1;
      });
