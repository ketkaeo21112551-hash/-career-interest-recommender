<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบทดสอบค้นหาอาชีพ (10 ข้อ)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">
  <div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
    <div class="text-center mb-10">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">🎯 แบบทดสอบค้นหาตัวตน (10 ข้อ)</h1>
      <p class="text-gray-600">ตอบคำถามเพื่อค้นหาอาชีพที่ใช่ที่สุดสำหรับคุณ</p>
    </div>

    <form id="quiz-form" class="space-y-8">
      <script>
        const questions = [
          { q: "1. เมื่อว่าง คุณชอบทำอะไร?", o: {teacher:"สอนคนอื่น", artist:"วาดรูป", engineer:"สร้างของ", athlete:"เล่นกีฬา", doctor:"ดูแลคนป่วย"} },
          { q: "2. เมื่อเพื่อนมีปัญหา คุณทำอะไร?", o: {lawyer:"ตัดสินด้วยเหตุผล", police:"ลุยจัดการ", nurse:"ดูแลเอาใจใส่", soldier:"ปกป้องทีม", teacher:"ให้คำปรึกษา"} },
          { q: "3. ชอบที่ทำงานแบบไหน?", o: {artist:"สตูดิโอส่วนตัว", engineer:"ไซต์งาน", athlete:"สนามแข่ง", doctor:"โรงพยาบาล", lawyer:"สำนักงานกฎหมาย"} },
          { q: "4. สิ่งที่คนอื่นชมคุณบ่อยๆ?", o: {teacher:"ใจดีสอนเก่ง", artist:"ช่างจินตนาการ", engineer:"วางแผนแม่น", athlete:"แข็งแรง", doctor:"ใจเย็น"} },
          { q: "5. ถ้าต้องเลือกอ่านหนังสือสักเล่ม?", o: {lawyer:"คดีความ", police:"สืบสวน", nurse:"สุขภาพ", soldier:"ประวัติศาสตร์", teacher:"จิตวิทยาเด็ก"} },
          { q: "6. เป้าหมายสูงสุดในชีวิตคือ?", o: {doctor:"ช่วยชีวิตคน", engineer:"สร้างสิ่งใหม่", artist:"ทิ้งผลงานไว้", lawyer:"ความยุติธรรม", athlete:"ชัยชนะ"} },
          { q: "7. คุณรับมือกับความกดดันยังไง?", o: {soldier:"อดทนสู้", teacher:"ใช้เหตุผล", nurse:"ใจเย็น", police:"จัดการทันที", artist:"ปลดปล่อยด้วยงาน"} },
          { q: "8. วิชาที่คุณชอบที่สุด?", o: {teacher:"ภาษาไทย", engineer:"คณิตศาสตร์", artist:"ศิลปะ", doctor:"ชีววิทยา", lawyer:"สังคม"} },
          { q: "9. ลักษณะนิสัยเด่นของคุณ?", o: {nurse:"อ่อนโยน", police:"กล้าหาญ", soldier:"มีวินัย", artist:"รักอิสระ", engineer:"ช่างคิด"} },
          { q: "10. คุณอยากเห็นตัวเองใน 10 ปีข้างหน้าทำอะไร?", o: {doctor:"รักษาผู้คน", lawyer:"ว่าความ", athlete:"เป็นนักกีฬาอาชีพ", soldier:"ปกป้องประเทศ", teacher:"สร้างบุคลากรเก่งๆ"} }
        ];

        questions.forEach((item, index) => {
          document.write(`
            <div class="p-5 bg-slate-50 rounded-xl border">
              <label class="block font-semibold mb-3">${item.q}</label>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                ${Object.entries(item.o).map(([val, text]) => `
                  <label class="flex items-center p-2 bg-white rounded-lg border hover:border-blue-400 cursor-pointer">
                    <input type="radio" name="q${index}" value="${val}" class="mr-2"> ${text}
                  </label>
                `).join('')}
              </div>
