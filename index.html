<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Recommender Pro</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { color: #4f46e5; text-align: center; }
        .q-box { margin-bottom: 25px; }
        .btn { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #e2e8f0; border-radius: 10px; cursor: pointer; text-align: left; background: white; transition: 0.3s; }
        .btn:hover { background: #eef2ff; border-color: #4f46e5; }
        .selected { background: #4f46e5 !important; color: white; border-color: #4f46e5; }
        .action-btn { width: 100%; padding: 18px; background: #4f46e5; color: white; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>แบบทดสอบอาชีพที่ใช่</h1>
        <div id="quiz"></div>
        <button class="action-btn" onclick="getResult()">วิเคราะห์อาชีพของฉัน</button>
        <div id="result" style="margin-top:20px; font-size:22px; font-weight:bold; color:#4f46e5; text-align:center;"></div>
    </div>

    <script>
        const questions = [
            {q: "1. งานในฝันของคุณคืออะไร?", a: ["งานลุยๆ ไม่หยุดนิ่ง", "งานที่สร้างสิ่งของ/โครงสร้าง", "งานดูแลผู้คน/สอน/รักษา"]},
            {q: "2. คุณรู้สึกอย่างไรกับเด็กๆ?", a: ["รัก อยากสอน/ดูแล", "เฉยๆ", "ไม่ถนัดเลย"]},
            {q: "3. ถ้าเจอเหตุการณ์วิกฤต คุณทำอย่างไร?", a: ["วิ่งเข้าหา/ตัดสินใจทันที", "วางแผนแก้ปัญหาอย่างใจเย็น", "คอยปลอบ/ประสานงานให้ทุกคนปลอดภัย"]},
            {q: "4. ความถนัดด้านร่างกายของคุณ?", a: ["แข็งแรง/อึด/ชอบกีฬา", "มือเบา/ทำงานละเอียด", "ชอบใช้ความคิดมากกว่าใช้แรง"]},
            {q: "5. คุณชอบงานลักษณะไหนมากที่สุด?", a: ["งานศิลป์/ร้องเพลง/วาดรูป", "งานโค้ด/เทคโนโลยี/คอมพิวเตอร์", "งานภาคสนาม/ป้องกัน/ความปลอดภัย"]},
            {q: "6. เรื่องการสื่อสารกับผู้คน?", a: ["ชอบเป็นศูนย์กลาง/พูดหน้าชั้น/ร้องเพลง", "ชอบคุยส่วนตัว/ให้คำปรึกษา", "ชอบทำงานเงียบๆ ไม่ยุ่งกับใคร"]},
            {q: "7. คุณชอบแก้ปัญหาแบบไหน?", a: ["วางโครงสร้าง/ซ่อมแซมสิ่งของ", "แก้ปัญหาชีวิต/ส่งเสริมการเรียนรู้", "จัดการปัญหาอาชญากรรม/ความปลอดภัย"]},
            {q: "8. สไตล์ความเท่ที่คุณชอบ?", a: ["เครื่องแบบ/เกียรติยศ", "ความคิดสร้างสรรค์/ผลงาน", "ความเสียสละ/ความเมตตา"]},
            {q: "9. ทำงานร่วมกับคนอื่น?", a: ["ทีมใหญ่ๆ มีระเบียบ", "ทีมเล็กๆ หรือทำงานคนเดียว", "อยากดูแลคนอื่นโดยตรง"]},
            {q: "10. ความอดทนต่อแรงกดดัน?", a: ["สูงมาก(ลุยได้เสมอ)", "สูงมาก(เน้นความแม่นยำ)", "สูงมาก(เน้นดูแลคน)"]}
        ];

        const quizDiv = document.getElementById('quiz');
        questions.forEach((item, i) => {
            quizDiv.innerHTML += `<div class='q-box'><p>${item.q}</p>` + 
            item.a.map(opt => `<button class='btn' onclick="select(this, ${i})">${opt}</button>`).join('') + `</div>`;
        });

        function select(btn, qIdx) {
            btn.parentElement.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function getResult() {
            const selected = document.querySelectorAll('.selected');
            if(selected.length < 10) { alert("ตอบให้ครบ 10 ข้อก่อนนะครับ!"); return; }
            
            let counts = { 'ลุย': 0, 'สร้าง': 0, 'ดูแล': 0, 'ศิลป์': 0 };
            selected.forEach(s => {
                let text = s.innerText;
                if(text.includes('ลุย') || text.includes('ปลอดภัย') || text.includes('กีฬา')) counts['ลุย']++;
                else if(text.includes('สร้าง') || text.includes('โค้ด') || text.includes('ละเอียด')) counts['สร้าง']++;
                else if(text.includes('ดูแล') || text.includes('สอน') || text.includes('รักษา')) counts['ดูแล']++;
                else counts['ศิลป์']++;
            });

            let max = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            let resultText = "คุณเหมาะกับ: ";
            if(max === 'ลุย') resultText += "ตำรวจ / ทหาร / นักกีฬาอาชีพ";
            else if(max === 'สร้าง') resultText += "วิศวกรโยธา / โปรแกรมเมอร์ (Coding)";
            else if(max === 'ดูแล') resultText += "คุณครู / พยาบาล";
            else resultText += "นักวาดรูป / นักร้อง";
            
            document.getElementById('result').innerText = resultText;
        }
    </script>
</body>
</html>
