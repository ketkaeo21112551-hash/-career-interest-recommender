<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบทดสอบค้นหาอาชีพในฝัน</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">
  <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">🎯 ค้นหาอาชีพที่ใช่สำหรับคุณ</h1>
      <p class="text-gray-600">วิเคราะห์ตัวตนผ่านจิตวิทยา เพื่อสร้างแรงบันดาลใจในอนาคต</p>
    </div>

    <form id="quiz-form" class="space-y-6">
      <div class="p-4 bg-slate-50 rounded-xl border">
        <label class="block font-semibold mb-2">1. ยามว่างคุณชอบทำกิจกรรมอะไรมากที่สุด?</label>
        <div class="space-y-2">
          <label class="flex items-center"><input type="radio" name="q1" value="teacher" class="mr-2"> สอนการบ้าน หรือเล่าเรื่องให้เด็กๆ ฟัง</label>
          <label class="flex items-center"><input type="radio" name="q1" value="artist" class="mr-2"> วาดรูป หรือออกแบบผลงานศิลปะ</label>
          <label class="flex items-center"><input type="radio" name="q1" value="engineer" class="mr-2"> ออกแบบโครงสร้าง หรือต่อโมเดล</label>
          <label class="flex items-center"><input type="radio" name="q1" value="athlete" class="mr-2"> ออกกำลังกาย หรือเล่นฟุตบอล</label>
          <label class="flex items-center"><input type="radio" name="q1" value="doctor" class="mr-2"> ศึกษาเรื่องสุขภาพและการปฐมพยาบาล</label>
        </div>
      </div>

      <div class="p-4 bg-slate-50 rounded-xl border">
        <label class="block font-semibold mb-2">2. เมื่อเพื่อนมีปัญหา คุณมักทำหน้าที่อะไร?</label>
        <div class="space-y-2">
          <label class="flex items-center"><input type="radio" name="q2" value="lawyer" class="mr-2"> ช่วยหาความจริงและใช้เหตุผลตัดสิน</label>
          <label class="flex items-center"><input type="radio" name="q2" value="police" class="mr-2"> กล้าหาญ ลุยเข้าไปจัดการปัญหา</label>
          <label class="flex items-center"><input type="radio" name="q2" value="nurse" class="mr-2"> ดูแลด้วยความอ่อนโยน</label>
          <label class="flex items-center"><input type="radio" name="q2" value="soldier" class="mr-2"> ปกป้องและคอยให้กำลังใจแบบทีม</label>
          <label class="flex items-center"><input type="radio" name="q2" value="teacher" class="mr-2"> ให้คำปรึกษาและชี้แนะแนวทาง</label>
        </div>
      </div>

      <div class="p-4 bg-slate-50 rounded-xl border">
        <label class="block font-semibold mb-2">3. สภาพแวดล้อมการทำงานแบบไหนที่คุณชอบ?</label>
        <div class="space-y-2">
          <label class="flex items-center"><input type="radio" name="q3" value="artist" class="mr-2"> ห้องส่วนตัวที่มีอิสระทางความคิด</label>
          <label class="flex items-center"><input type="radio" name="q3" value="engineer" class="mr-2"> หน้างานจริง หรือไซต์ก่อสร้าง</label>
          <label class="flex items-center"><input type="radio" name="q3" value="athlete" class="mr-2"> สนามกีฬาหรือที่โล่งแจ้ง</label>
          <label class="flex items-center"><input type="radio" name="q3" value="doctor" class="mr-2"> โรงพยาบาลที่ได้ช่วยเหลือคน</label>
          <label class="flex items-center"><input type="radio" name="q3" value="lawyer" class="mr-2"> ศาล หรือห้องประชุมที่ใช้เจรจา</label>
        </div>
      </div>

      <button type="button" onclick="getResult()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition">วิเคราะห์ผลลัพธ์แบบเจาะลึก</button>
    </form>

    <div id="result" class="hidden mt-8 p-6 bg-blue-50 border-2 border-blue-200 rounded-2xl text-center">
      <h3 id="job-name" class="text-2xl font-bold text-blue-900 mb-4"></h3>
      <p id="job-desc" class="text-gray-700 leading-relaxed italic"></p>
    </div>
  </div>

  <script>
    function getResult() {
      const q1 = document.querySelector('input[name="q1"]:checked');
      const q2 = document.querySelector('input[name="q2"]:checked');
      const q3 = document.querySelector('input[name="q3"]:checked');
      if (!q1 || !q2 || !q3) { alert('กรุณาตอบให้ครบทุกข้อครับ!'); return; }

      const scores = {};
      [q1, q2, q3].forEach(q => { scores[q.value] = (scores[q.value] || 0) + 1; });
      let best = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
      
      const jobs = {
        teacher: { name: "คุณครู", desc: "คุณเหมาะกับอาชีพครูเพราะคุณมี 'ใจรักในการให้' และความอดทนสูง คุณพร้อมจะเป็นแสงสว่างชี้นำทางให้ผู้อื่น ซึ่งเป็นคุณสมบัติที่สำคัญที่สุดของผู้ให้ความรู้ครับ!" },
        artist: { name: "ศิลปิน / นักออกแบบ", desc: "คุณเหมาะกับอาชีพนี้เพราะคุณมี 'ความคิดสร้างสรรค์ที่เป็นเลิศ' โลกต้องการคนอย่างคุณที่กล้าจะเปลี่ยนจินตนาการให้เป็นความจริงเพื่อสร้างแรงบันดาลใจให้คนรอบข้างครับ" },
        engineer: { name: "วิศวกรโยธา", desc: "คุณเหมาะกับอาชีพนี้เพราะคุณมี 'หัวใจนักสร้าง' ที่พร้อมจะวางรากฐานให้สังคมแข็งแรง ความละเอียดรอบคอบของคุณคือสิ่งที่จะสร้างความเป็นระเบียบให้แก่โลกใบนี้ครับ" },
        athlete: { name: "นักกีฬาอาชีพ", desc: "คุณเหมาะกับอาชีพนี้เพราะคุณมี 'จิตวิญญาณแห่งนักสู้' ความมุ่งมั่นและวินัยของคุณจะผลักดันให้คุณไปสู่จุดสูงสุด และเป็นต้นแบบของความแข็งแกร่งครับ" },
        doctor: { name: "คุณหมอ", desc: "คุณเหมาะกับอาชีพนี้เพราะคุณมี 'จิตใจที่งดงามและพร้อมเสียสละ' ความเมตตาที่คุณมีจะช่วยรักษาทั้งร่างกายและหัวใจของผู้คนให้ดีขึ้นครับ" },
        lawyer: { name: "ทนายความ", desc: "คุณเหมาะกับอาชีพนี้เพราะคุณมี 'ความยุติธรรมในหัวใจ' และกล้าที่จะยืนหยัดในความถูกต้อง เพื่อปกป้องผู้ที่อ่อนแอกว่าครับ" },
        police: { name: "ตำรวจ", desc: "คุณเหมาะกับอาชีพนี้เพราะคุณมี 'ความกล้าหาญที่อยากช่วยเหลือประชาชน' ความเสียสละของคุณจะทำให้สังคมมีความสงบสุขและปลอดภัยขึ้นมากครับ" },
        nurse: { name: "พยาบาล", desc: "คุณเหมาะกับอาชีพนี้เพราะคุณมี 'ความอ่อนโยนที่เป็นพลังใจ' ความเห็นอกเห็นใจของคุณจะช่วยให้ผู้ป่วยมีกำลังใจและฟื้นตัวได้เร็วยิ่งขึ้นครับ" },
        soldier: { name: "ทหาร", desc: "คุณเหมาะกับอาชีพนี้เพราะคุณมี 'ความรับผิดชอบที่ยิ่งใหญ่' ความรักชาติและความเข้มแข็งของคุณคือเกราะป้องกันที่สำคัญให้กับคนในชาติครับ" }
      };

      document.getElementById('job-name').innerText = "อาชีพที่ใช่สำหรับคุณคือ: " + jobs[best].name;
      document.getElementById('job-desc').innerText = jobs[best].desc;
      document.getElementById('result').classList.remove('hidden');
      document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
    }
  </script>
</body>
</html>
