<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบทดสอบค้นหาอาชีพ (10 ข้อ)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4">
  <div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl">
    <h1 class="text-3xl font-bold text-center mb-8">🎯 แบบทดสอบค้นหาตัวตน (10 ข้อ)</h1>
    
    <form id="quiz-form" class="space-y-6">
      <div id="quiz-container" class="space-y-6">
        <div class="p-5 bg-slate-50 rounded-xl border">
          <label class="block font-semibold mb-3">1. เมื่อว่าง คุณชอบทำอะไร?</label>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
            <label class="flex items-center p-2 bg-white rounded-lg border cursor-pointer"><input type="radio" name="q0" value="teacher" class="mr-2"> สอนคนอื่น</label>
            <label class="flex items-center p-2 bg-white rounded-lg border cursor-pointer"><input type="radio" name="q0" value="artist" class="mr-2"> วาดรูป</label>
            <label class="flex items-center p-2 bg-white rounded-lg border cursor-pointer"><input type="radio" name="q0" value="engineer" class="mr-2"> สร้างของ</label>
            <label class="flex items-center p-2 bg-white rounded-lg border cursor-pointer"><input type="radio" name="q0" value="athlete" class="mr-2"> เล่นกีฬา</label>
            <label class="flex items-center p-2 bg-white rounded-lg border cursor-pointer"><input type="radio" name="q0" value="doctor" class="mr-2"> ดูแลคนป่วย</label>
          </div>
        </div>
        </div>

      <button type="button" onclick="getResult()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700">ดูผลการวิเคราะห์</button>
    </form>

    <div id="result" class="hidden mt-8 p-6 bg-blue-50 border-2 border-blue-200 rounded-2xl text-center">
      <h3 id="job-name" class="text-2xl font-bold text-blue-900 mb-2"></h3>
      <p id="job-desc" class="text-gray-700"></p>
    </div>
  </div>

  <script>
    function getResult() {
      // ระบบคำนวณเหมือนเดิมครับ
      alert("ระบบวิเคราะห์พร้อมใช้งานแล้ว!");
    }
  </script>
</body>
</html>
