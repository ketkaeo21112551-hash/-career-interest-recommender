<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-2">Career Interest Recommender 🚀</h1>
        <p class="text-gray-600 mb-6">บอกความสนใจของคุณ แล้วให้ระบบแนะนำอาชีพที่ใช่!</p>
        
        <textarea id="interest" class="w-full border p-2 mb-4" placeholder="เช่น ฉันชอบลุยๆ, ฉันชอบดนตรี..."></textarea>
        
        <button onclick="getCareer()" class="bg-blue-600 text-white w-full py-2 rounded">วิเคราะห์อาชีพ</button>
        
        <div id="result" class="mt-4 p-4 bg-gray-100 rounded min-h-[50px]"></div>
    </div>

    <script>
        function getCareer() {
            const userInput = document.getElementById("interest").value;
            const resultDiv = document.getElementById("result");

            if (!userInput) {
                alert("กรุณากรอกความสนใจ");
                return;
            }

            resultDiv.innerText = "กำลังวิเคราะห์...";

            setTimeout(() => {
                let recommendation = "";
                const input = userInput.toLowerCase();

                if (input.includes("ลุย") || input.includes("กีฬา") || input.includes("ผจญภัย")) {
                    recommendation = "น่าสนใจมาก! กับความชอบสายลุยของคุณ อาชีพที่เหมาะคือ: นักกีฬาอาชีพ หรือ ไกด์นำเที่ยวเชิงผจญภัย";
                } else if (input.includes("ร้องเพลง") || input.includes("ดนตรี") || input.includes("ศิลปะ")) {
                    recommendation = "คุณมีหัวใจศิลปิน! อาชีพที่น่าจะใช่คือ: นักแต่งเพลง หรือ กราฟิกดีไซน์เนอร์";
                } else if (input.includes("เด็ก") || input.includes("สอน")) {
                    recommendation = "คุณมีใจรักการดูแล! อาชีพที่เหมาะคือ: ครูปฐมวัย หรือ นักจิตวิทยาเด็ก";
                } else {
                    const jobs = ["นักการตลาดดิจิทัล", "นักวิเคราะห์ข้อมูล", "ผู้ประกอบการ"];
                    recommendation = "จากความสนใจของคุณ ลองพิจารณาอาชีพนี้ดูครับ: " + jobs[Math.floor(Math.random() * jobs.length)];
                }

                resultDiv.innerText = recommendation;
            }, 1000);
        }
    </script>
</body>
</html>
