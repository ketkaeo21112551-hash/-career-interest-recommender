<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        <h1 class="text-2xl font-bold mb-2">Career Interest Recommender 🚀</h1>
        <p class="text-gray-600 mb-6">บอกความสนใจของคุณ แล้วให้ระบบแนะนำอาชีพที่ใช่!</p>
        
        <textarea id="interest" class="w-full border p-2 mb-4" placeholder="เช่น ฉันชอบงานออกแบบ..."></textarea>
        
        <button onclick="getCareer()" class="bg-blue-600 text-white w-full py-2 rounded">วิเคราะห์อาชีพ</button>
        
        <div id="result" class="mt-4 p-4 bg-gray-100 rounded min-h-[50px]"></div>
    </div>

        <script>
        async function getCareer() {
            const userInput = document.getElementById("interest").value;
            const resultDiv = document.getElementById("result");
            const API_KEY = "AQ.Ab8RN6JHe4QdXTRtXkdC9HWHZK5QE_6Pb0Oq9NoTPNTVF63GjQ";
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

            if (!userInput) return alert("กรุณากรอกความสนใจ");
            resultDiv.innerText = "กำลังวิเคราะห์...";

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "แนะนำอาชีพให้หน่อยถ้าฉันสนใจเรื่อง: " + userInput }] }]
                    })
                });
                const data = await response.json();
                resultDiv.innerText = data.candidates[0].content.parts[0].text;
            } catch (err) {
                resultDiv.innerText = "เกิดข้อผิดพลาด: ไม่สามารถเชื่อมต่อกับ AI ได้";
            }
        }
    </script>
